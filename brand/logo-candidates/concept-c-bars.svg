<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="PIPBench concept C: bars against a benchmark line">
  <!-- Concept C: three cost bars measured against a single benchmark datum line;
       one bar exceeds it and is flagged amber. -->
  <rect width="640" height="200" fill="#F7F4EE"/>
  <g transform="translate(44,36)">
    <rect x="0" y="58" width="26" height="70" rx="4" fill="#10293D"/>
    <rect x="38" y="20" width="26" height="108" rx="4" fill="#E8A317"/>
    <rect x="76" y="72" width="26" height="56" rx="4" fill="#10293D"/>
    <!-- benchmark datum line across all bars -->
    <rect x="-10" y="48" width="122" height="5" rx="2.5" fill="#BF4034"/>
  </g>
  <g transform="translate(200,0)">
    <text x="0" y="122" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="64" fill="#10293D">PIP<tspan fill="#33526B" font-weight="600">Bench</tspan></text>
    <text x="2" y="152" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="17" letter-spacing="0.5" fill="#6B7A88">EVERY LINE, BENCHMARKED. EVERY SOURCE, NAMED.</text>
  </g>
</svg>

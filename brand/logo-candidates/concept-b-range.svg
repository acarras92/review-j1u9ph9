<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="PIPBench concept B: range band with out-of-range marker">
  <!-- Concept B: the product's core finding as the mark —
       a benchmark range band with the bid marker sitting above the high end. -->
  <rect width="640" height="200" fill="#F7F4EE"/>
  <g transform="translate(36,58)">
    <!-- range band -->
    <rect x="0" y="40" width="128" height="22" rx="11" fill="#10293D"/>
    <!-- in-range zone -->
    <rect x="14" y="46" width="72" height="10" rx="5" fill="#2F7D4F"/>
    <!-- ticks: low / avg / high -->
    <rect x="14" y="34" width="3" height="34" fill="#F7F4EE" opacity="0.9"/>
    <rect x="49" y="34" width="3" height="34" fill="#F7F4EE" opacity="0.9"/>
    <rect x="84" y="34" width="3" height="34" fill="#F7F4EE" opacity="0.9"/>
    <!-- the bid: a dot beyond the high end, flagged -->
    <circle cx="112" cy="18" r="12" fill="#BF4034"/>
    <path d="M112 30 L112 40" stroke="#BF4034" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(200,0)">
    <text x="0" y="122" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="64" fill="#10293D">PIP<tspan fill="#33526B" font-weight="600">Bench</tspan></text>
    <text x="2" y="152" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="17" letter-spacing="0.5" fill="#6B7A88">BENCHMARK THE BID. TAKE THE MEMO TO THE NEGOTIATION.</text>
  </g>
</svg>

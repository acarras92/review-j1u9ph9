<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="PIPBench concept D: PB monogram with level line">
  <!-- Concept D: geometric PB monogram in a squared badge, split by a level line
       (the benchmark) running through both letterforms. -->
  <rect width="640" height="200" fill="#F7F4EE"/>
  <g transform="translate(40,36)">
    <rect x="0" y="0" width="128" height="128" rx="18" fill="#10293D"/>
    <!-- P -->
    <path d="M28 96 L28 30 L58 30 A16 16 0 0 1 58 62 L40 62 L40 96 Z M40 40 L40 52 L56 52 A6 6 0 0 0 56 40 Z" fill="#F7F4EE"/>
    <!-- B -->
    <path d="M70 96 L70 30 L98 30 A15 15 0 0 1 104 58 A16 16 0 0 1 98 96 Z M82 40 L82 56 L96 56 A8 8 0 0 0 96 40 Z M82 66 L82 86 L97 86 A10 10 0 0 0 97 66 Z" fill="#F7F4EE"/>
    <!-- level line through both letters -->
    <rect x="14" y="60" width="100" height="5" rx="2.5" fill="#E8A317"/>
  </g>
  <g transform="translate(200,0)">
    <text x="0" y="122" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="64" fill="#10293D">PIP<tspan fill="#33526B" font-weight="600">Bench</tspan></text>
    <text x="2" y="152" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="17" letter-spacing="0.5" fill="#6B7A88">THE OWNER-SIDE PIP BENCHMARK.</text>
  </g>
</svg>
